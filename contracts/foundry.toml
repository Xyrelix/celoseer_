[profile.default]
src      = "src"
out      = "out"
libs     = ["lib"]
test     = "test"
script   = "script"
solc     = "0.8.24"
optimizer       = true
optimizer_runs  = 200
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
alfajores = "https://forno.celo-sepolia.celo-testnet.org"
celo      = "https://forno.celo.org"
localhost = "http://127.0.0.1:8545"

[etherscan]
alfajores     = { key = "${CELOSCAN_API_KEY}", url = "https://api-alfajores.celoscan.io/api" }
celo_sepolia  = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/v2/api" }
celo          = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }
